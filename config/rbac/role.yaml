---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  - services
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - certificate.jerkytreats.dev
  resources:
  - certificatebundles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - certificate.jerkytreats.dev
  resources:
  - certificatebundles/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - dns.jerkytreats.dev
  resources:
  - dnsrecords
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dns.jerkytreats.dev
  resources:
  - dnsrecords/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - publish.jerkytreats.dev
  resources:
  - publishedservices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - publish.jerkytreats.dev
  resources:
  - publishedservices/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - tailscale.jerkytreats.dev
  resources:
  - tailnetdnsconfigs
  - tailnetdnsendpoints
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - tailscale.jerkytreats.dev
  resources:
  - tailnetdnsconfigs/status
  - tailnetdnsendpoints/status
  verbs:
  - get
  - patch
  - update
