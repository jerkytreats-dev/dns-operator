apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dns-operator.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dns-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "dns-operator.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        {{- include "dns-operator.selectorLabels" . | nindent 8 }}
        control-plane: controller-manager
    spec:
      serviceAccountName: {{ include "dns-operator.managerServiceAccountName" . }}
      terminationGracePeriodSeconds: 10
      securityContext:
        {{- toYaml .Values.operator.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            - --leader-elect
            {{- if .Values.operator.metrics.enabled }}
            - --metrics-bind-address=:8443
            {{- end }}
            - --health-probe-bind-address=:8081
            - --authoritative-zone={{ .Values.operator.authoritativeZone }}
            - --publish-zones={{ include "dns-operator.publishZonesArg" . }}
          ports:
            {{- if .Values.operator.metrics.enabled }}
            - name: https
              containerPort: 8443
              protocol: TCP
            {{- end }}
          securityContext:
            {{- toYaml .Values.operator.containerSecurityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
{{- if and .Values.operator.metrics.enabled .Values.operator.metrics.service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dns-operator.fullname" . }}-controller-manager-metrics-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dns-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  ports:
    - name: https
      port: {{ .Values.operator.metrics.service.port }}
      protocol: TCP
      targetPort: 8443
  selector:
    {{- include "dns-operator.selectorLabels" . | nindent 4 }}
    control-plane: controller-manager
{{- end }}
