apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-operator-caddy
  namespace: dns-operator-system
  labels:
    app.kubernetes.io/name: dns-operator
    app.kubernetes.io/component: caddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dns-operator
      app.kubernetes.io/component: caddy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dns-operator
        app.kubernetes.io/component: caddy
    spec:
      serviceAccountName: dns-operator-caddy
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: caddy
          image: caddy:2
          command:
            - caddy
          args:
            - run
            - --config
            - /etc/caddy/Caddyfile
            - --adapter
            - caddyfile
            - --watch
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
            - name: health
              containerPort: 2019
          readinessProbe:
            httpGet:
              path: /health
              port: health
          livenessProbe:
            httpGet:
              path: /health
              port: health
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: caddy-bootstrap
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: caddy-generated
              mountPath: /etc/caddy/generated
              readOnly: true
            - name: caddy-certificates
              mountPath: /etc/dns-operator/certs
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
            - name: caddy-tmp
              mountPath: /tmp
      volumes:
        - name: caddy-bootstrap
          configMap:
            name: dns-operator-caddy-bootstrap
        - name: caddy-generated
          configMap:
            name: caddy-runtime
            optional: true
        - name: caddy-certificates
          secret:
            secretName: caddy-runtime-certificates
            optional: true
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
        - name: caddy-tmp
          emptyDir: {}
