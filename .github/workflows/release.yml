name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jerkytreats/dns-operator
  CHART_PATH: charts/dns-operator
  CHART_NAME: dns-operator
  CHART_REGISTRY: oci://ghcr.io/jerkytreats/charts

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Run tests
        run: make test

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve chart version
        id: chart_version
        run: |
          tag="${{ steps.release_tag.outputs.value }}"
          version="${tag#v}"
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in Helm to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username "${{ github.actor }}" --password-stdin

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.release_tag.outputs.value }}
            type=raw,value=latest,enable=${{ startsWith(steps.release_tag.outputs.value, 'v') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build installer bundle
        run: make build-installer IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release_tag.outputs.value }}

      - name: Package chart
        run: |
          mkdir -p dist/chart
          helm package ${{ env.CHART_PATH }} \
            --destination dist/chart \
            --version ${{ steps.chart_version.outputs.value }} \
            --app-version ${{ steps.release_tag.outputs.value }}

      - name: Push chart
        run: |
          helm push dist/chart/${{ env.CHART_NAME }}-${{ steps.chart_version.outputs.value }}.tgz ${{ env.CHART_REGISTRY }}

      - name: Upload installer bundle
        uses: actions/upload-artifact@v4
        with:
          name: dns-operator-install-${{ steps.release_tag.outputs.value }}
          path: dist/install.yaml

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: dns-operator-chart-${{ steps.chart_version.outputs.value }}
          path: dist/chart/${{ env.CHART_NAME }}-${{ steps.chart_version.outputs.value }}.tgz
